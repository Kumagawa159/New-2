<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrivateLink - Secure P2P Communication</title>
    <style>
        :root {
            --bg-primary: #1a1b1e;
            --bg-secondary: #2c2d30;
            --bg-tertiary: #383a40;
            --bg-sidebar: #1e1f22;
            --text-primary: #e4e4e5;
            --text-secondary: #b5b5b8;
            --text-muted: #8e8e92;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --accent-light: #6d75f5;
            --danger: #ed4245;
            --danger-hover: #c93337;
            --success: #57f287;
            --warning: #fbbd23;
            --border: #3f4147;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-xs: 6px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ============ SIDEBAR ============ */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            z-index: 10;
            transition: transform var(--transition);
        }
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .mobile-sidebar-toggle {
                display: flex !important;
            }
        }
        .mobile-sidebar-toggle {
            display: none;
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 100;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all var(--transition);
        }
        .mobile-sidebar-toggle:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-logo {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        .sidebar-title {
            font-weight: 700;
            font-size: 16px;
            letter-spacing: -0.3px;
        }
        .sidebar-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .sidebar-section {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 700;
        }
        .room-code-display {
            background: var(--bg-tertiary);
            border-radius: var(--radius-xs);
            padding: 10px 12px;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            letter-spacing: 1px;
            color: var(--success);
            word-break: break-all;
            border: 1px solid var(--border);
            text-align: center;
            font-weight: 600;
        }
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            padding: 6px 0;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .status-dot.idle {
            background: var(--text-muted);
        }
        .status-dot.connecting {
            background: var(--warning);
            animation: pulse 1s infinite;
        }
        .status-dot.connected {
            background: var(--success);
            box-shadow: 0 0 8px rgba(87, 242, 135, 0.5);
        }
        .status-dot.error {
            background: var(--danger);
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        .participant-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: var(--radius-xs);
            margin-bottom: 4px;
            cursor: default;
            font-size: 13px;
            font-weight: 500;
            transition: background var(--transition);
        }
        .participant-item:hover {
            background: var(--bg-tertiary);
        }
        .participant-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
        }
        .participant-avatar.you {
            background: var(--accent);
            color: #fff;
        }
        .participant-avatar.peer {
            background: var(--success);
            color: #000;
        }

        /* ============ MAIN CONTENT ============ */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            position: relative;
        }

        /* Video Grid */
        .video-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 8px;
            padding: 8px;
            background: #000;
            min-height: 0;
        }
        .video-grid.single-screen {
            grid-template-columns: 1fr;
            grid-template-rows: 1fr;
        }
        .video-grid.one-remote {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr;
        }
        .video-grid.with-screenshare {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }
        .video-container {
            position: relative;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid transparent;
            transition: border-color var(--transition);
            min-height: 120px;
        }
        .video-container.active-speaker {
            border-color: var(--success);
        }
        .video-container.screenshare-container {
            grid-column: 1 / -1;
            border-color: var(--accent);
            border-width: 3px;
        }
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: calc(var(--radius-sm) - 2px);
        }
        .video-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            pointer-events: none;
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
        }
        .video-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 13px;
        }
        .video-placeholder .icon {
            font-size: 48px;
            opacity: 0.5;
        }
        .recording-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--danger);
            color: #fff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            animation: pulse 1.2s infinite;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .recording-badge::before {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #fff;
        }

        /* Controls Bar */
        .controls-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
            z-index: 5;
        }
        .control-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            position: relative;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            flex-shrink: 0;
        }
        .control-btn:hover {
            background: #4a4d55;
            transform: translateY(-1px);
        }
        .control-btn:active {
            transform: scale(0.95);
        }
        .control-btn.active-muted {
            background: var(--danger);
            color: #fff;
        }
        .control-btn.active-muted:hover {
            background: var(--danger-hover);
        }
        .control-btn.screen-share-active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 16px rgba(88, 101, 242, 0.5);
        }
        .control-btn.recording-active {
            background: var(--danger);
            color: #fff;
            animation: pulse 1.2s infinite;
        }
        .control-btn.hangup {
            background: var(--danger);
            color: #fff;
            width: 50px;
            height: 50px;
            font-size: 22px;
        }
        .control-btn.hangup:hover {
            background: #ff1f24;
            box-shadow: 0 4px 16px rgba(237, 66, 69, 0.5);
        }
        .control-btn .tooltip {
            position: absolute;
            bottom: 110%;
            background: #000;
            color: #fff;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 11px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity var(--transition);
            font-weight: 500;
        }
        .control-btn:hover .tooltip {
            opacity: 1;
        }

        /* ============ CHAT PANEL ============ */
        .chat-panel {
            position: fixed;
            right: -380px;
            top: 0;
            bottom: 0;
            width: 360px;
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 20;
            transition: right var(--transition);
            box-shadow: var(--shadow);
        }
        .chat-panel.open {
            right: 0;
        }
        @media (max-width: 500px) {
            .chat-panel {
                width: 100%;
                right: -100%;
            }
        }
        .chat-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 700;
        }
        .chat-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 20px;
            padding: 4px 8px;
            border-radius: var(--radius-xs);
            transition: all var(--transition);
        }
        .chat-close:hover {
            color: #fff;
            background: var(--bg-tertiary);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .chat-message {
            padding: 8px 12px;
            border-radius: var(--radius-xs);
            max-width: 85%;
            word-break: break-word;
            font-size: 13px;
            line-height: 1.4;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .chat-message.sent {
            background: var(--accent);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .chat-message.received {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        .chat-message.system {
            background: transparent;
            color: var(--text-muted);
            align-self: center;
            font-size: 11px;
            font-style: italic;
            text-align: center;
        }
        .chat-input-area {
            padding: 12px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }
        .chat-input {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: border-color var(--transition);
            font-family: var(--font);
        }
        .chat-input:focus {
            border-color: var(--accent);
        }
        .chat-send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            transition: all var(--transition);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-send-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }
        .chat-send-btn:active {
            transform: scale(0.95);
        }

        /* ============ SIGNALING OVERLAY ============ */
        .signaling-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        .signaling-card {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 28px;
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .signaling-card h2 {
            font-size: 20px;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }
        .signaling-card .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 20px;
        }
        .signaling-step {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            align-items: flex-start;
        }
        .step-number {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
            flex-shrink: 0;
        }
        .signaling-textarea {
            width: 100%;
            height: 100px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            color: var(--text-primary);
            padding: 10px;
            font-size: 11px;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            resize: vertical;
            word-break: break-all;
            outline: none;
        }
        .signaling-textarea:focus {
            border-color: var(--accent);
        }
        .btn {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all var(--transition);
            letter-spacing: 0.2px;
            font-family: var(--font);
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(88, 101, 242, 0.4);
        }
        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            background: #4a4d55;
        }
        .btn-danger {
            background: var(--danger);
            color: #fff;
        }
        .btn-danger:hover {
            background: var(--danger-hover);
        }
        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .copied-feedback {
            color: var(--success);
            font-size: 12px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .copied-feedback.show {
            opacity: 1;
        }

        /* ============ TOAST ============ */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #000;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            z-index: 100;
            transition: transform var(--transition);
            pointer-events: none;
            box-shadow: var(--shadow);
            letter-spacing: 0.2px;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #777;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
                gap: 4px;
                padding: 4px;
            }
            .video-grid.one-remote {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }
            .video-grid.with-screenshare {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
            }
            .controls-bar {
                gap: 6px;
                padding: 8px 10px;
            }
            .control-btn {
                width: 38px;
                height: 38px;
                font-size: 16px;
            }
            .control-btn.hangup {
                width: 42px;
                height: 42px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- Mobile sidebar toggle -->
    <button class="mobile-sidebar-toggle" onclick="toggleSidebar()" title="Toggle Sidebar">☰</button>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">🔒</div>
            <div>
                <div class="sidebar-title">PrivateLink</div>
                <div class="sidebar-subtitle">End-to-End Encrypted</div>
            </div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-label">Room</div>
            <div class="room-code-display" id="roomCodeDisplay">—</div>
            <div class="status-indicator" style="margin-top:6px;">
                <span class="status-dot idle" id="statusDot"></span>
                <span id="statusText">Disconnected</span>
            </div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-label">Participants</div>
            <div class="participant-item">
                <div class="participant-avatar you">Y</div>
                <span>You</span>
            </div>
            <div class="participant-item" id="peerParticipant">
                <div class="participant-avatar peer" style="background:var(--bg-tertiary);color:var(--text-muted);">?</div>
                <span style="color:var(--text-muted);">Waiting for peer...</span>
            </div>
        </div>
        <div style="flex:1;"></div>
        <div class="sidebar-section">
            <button class="btn btn-secondary" style="width:100%;" onclick="toggleChat()">💬 Toggle Chat</button>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
        <div class="video-grid" id="videoGrid">
            <!-- Local Video -->
            <div class="video-container" id="localVideoContainer">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="video-label">You</div>
                <div class="video-placeholder" id="localPlaceholder">
                    <span class="icon">📷</span>
                    <span>Camera off</span>
                </div>
            </div>
            <!-- Remote Video -->
            <div class="video-container" id="remoteVideoContainer">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="video-label">Peer</div>
                <div class="video-placeholder" id="remotePlaceholder">
                    <span class="icon">👤</span>
                    <span>Waiting for connection</span>
                </div>
            </div>
            <!-- Screen Share (hidden by default) -->
            <div class="video-container screenshare-container" id="screenshareContainer" style="display:none;">
                <video id="screenshareVideo" autoplay playsinline></video>
                <div class="video-label">📺 Screen Share</div>
                <div class="recording-badge" id="recordingBadge" style="display:none;">● REC</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls-bar" id="controlsBar">
            <button class="control-btn" id="micBtn" onclick="toggleMic()" title="Toggle Microphone">
                🎤<span class="tooltip">Microphone</span>
            </button>
            <button class="control-btn" id="camBtn" onclick="toggleCamera()" title="Toggle Camera">
                📷<span class="tooltip">Camera</span>
            </button>
            <button class="control-btn" id="screenshareBtn" onclick="toggleScreenShare()" title="Share Screen">
                🖥️<span class="tooltip">Share Screen</span>
            </button>
            <button class="control-btn" id="recordBtn" onclick="toggleRecording()" title="Record Screen">
                ⏺️<span class="tooltip">Record</span>
            </button>
            <button class="control-btn hangup" id="hangupBtn" onclick="hangUp()" title="End Call">
                ✕
            </button>
        </div>
    </div>

    <!-- Chat Panel -->
    <div class="chat-panel" id="chatPanel">
        <div class="chat-header">
            💬 Chat
            <button class="chat-close" onclick="toggleChat()">✕</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="chat-message system">Chat is end-to-end encrypted</div>
        </div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendChat()">
            <button class="chat-send-btn" onclick="sendChat()">➤</button>
        </div>
    </div>

    <!-- Signaling Overlay -->
    <div class="signaling-overlay" id="signalingOverlay">
        <div class="signaling-card" id="signalingCard">
            <!-- Dynamic content based on state -->
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ==================== STATE ====================
        const APP_STATE = {
            IDLE: 'idle',

        function addChatMessage(text, type) {
            const msg = document.createElement('div');
            msg.className = 'chat-message ' + type;
            msg.textContent = text;
            dom.chatMessages.appendChild(msg);
            dom.chatMessages.scrollTop = dom.chatMessages.scrollHeight;
        }

        function sendChat() {
            const text = dom.chatInput.value.trim();
            if (!text) return;
            if (!dataChannel && !remoteDataChannel) {
                showToast('Chat not available – not connected');
                return;
            }
            const channel = dataChannel || remoteDataChannel;
            if (channel && channel.readyState === 'open') {
                const msg = JSON.stringify({ type: 'chat', message: text, timestamp: Date.now() });
                channel.send(msg);
                addChatMessage(text, 'sent');
                dom.chatInput.value = '';
            } else {
                showToast('Chat channel not ready');
            }
        }

        // ==================== WEBRTC ====================
        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
            ],
        };

        async function getLocalMedia(audio = true, video = true) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: audio,
                    video: video ? { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' } : false,
                });
                return stream;
            } catch (err) {
                console.error('getUserMedia error:', err);
                if (video && err.name === 'NotAllowedError') {
                    // Try audio only
                    try {
                        const audioOnly = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                        showToast('Camera access denied – using audio only');
                        return audioOnly;
                    } catch (e) {
                        throw new Error(
                            'Camera and microphone access denied. Please allow permissions in your browser settings.');
                    }
                }
                throw err;
            }
        }

        function createPeerConnection() {
            const pc = new RTCPeerConnection(rtcConfig);

            pc.oniceconnectionstatechange = () => {
                console.log('ICE state:', pc.iceConnectionState);
                if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
                    updateStatus('connected', 'Connected (P2P Encrypted)');
                    updatePeerInfo(true, 'Peer');
                    dom.roomCodeDisplay.textContent = roomCode || 'CONNECTED';
                } else if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                    updateStatus('error', 'Connection lost');
                } else if (pc.iceConnectionState === 'checking') {
                    updateStatus('connecting', 'Establishing connection...');
                }
            };

            pc.onconnectionstatechange = () => {
                console.log('Connection state:', pc.connectionState);
                if (pc.connectionState === 'connected') {
                    updateStatus('connected', 'Connected (P2P Encrypted)');
                } else if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                    updateStatus('error', 'Disconnected');
                    showToast('Connection lost');
                }
            };

            pc.ontrack = (event) => {
                console.log('Received track:', event.track.kind, event.track.label);
                const stream = event.streams[0];
                if (!stream) return;

                // Determine if this is a screen share track
                const isScreenShare = event.track.label.includes('screen') ||
                    event.track.label.includes('display') ||
                    event.track.label.includes('window') ||
                    (stream.getVideoTracks().length > 0 && !stream.getAudioTracks().length && dom.remoteVideo
                        .srcObject);

                if (event.track.kind === 'video' && isScreenShare) {
                    // Screen share track
                    console.log('Screen share track received');
                    remoteScreenShareStream = stream;
                    dom.screenshareVideo.srcObject = stream;
                    dom.screenshareContainer.style.display = 'flex';
                    dom.videoGrid.classList.add('with-screenshare');
                    updateVideoGridLayout();
                    addChatMessage('Peer started sharing their screen', 'system');
                    event.track.onended = () => {
                        console.log('Remote screen share ended');
                        dom.screenshareVideo.srcObject = null;
                        dom.screenshareContainer.style.display = 'none';
                        dom.videoGrid.classList.remove('with-screenshare');
                        remoteScreenShareStream = null;
                        updateVideoGridLayout();
                        if (isRecording && !screenShareStream) {
                            stopRecording();
                        }
                        addChatMessage('Peer stopped sharing their screen', 'system');
                    };
                } else if (event.track.kind === 'video') {
                    // Camera track
                    dom.remoteVideo.srcObject = stream;
                    dom.remotePlaceholder.style.display = 'none';
                    dom.remoteVideo.style.display = 'block';
                    updateVideoGridLayout();
                } else if (event.track.kind === 'audio') {
                    // Audio track - handled automatically by the video element or audio element
                    const audioStream = new MediaStream([event.track]);
                    const audioEl = document.createElement('audio');
                    audioEl.srcObject = audioStream;
                    audioEl.autoplay = true;
                    audioEl.play().catch(() => {});
                }
            };

            pc.onicecandidate = (event) => {
                // We're using end-of-candidates approach, so individual candidates are handled automatically
                if (!event.candidate) {
                    console.log('ICE gathering complete');
                }
            };

            pc.onicegatheringstatechange = () => {
                console.log('ICE gathering state:', pc.iceGatheringState);
            };

            return pc;
        }

        function updateVideoGridLayout() {
            const hasRemoteVideo = dom.remoteVideo.srcObject !== null;
            const hasScreenShare = dom.screenshareContainer.style.display !== 'none' && dom.screenshareVideo
                .srcObject !== null;
            const hasLocalVideo = localStream && localStream.getVideoTracks().length > 0;

            dom.videoGrid.classList.remove('single-screen', 'one-remote', 'with-screenshare');

            if (hasScreenShare) {
                dom.videoGrid.classList.add('with-screenshare');
            } else if (hasRemoteVideo) {
                dom.videoGrid.classList.add('one-remote');
            } else if (!hasRemoteVideo && !hasScreenShare) {
                dom.videoGrid.classList.add('single-screen');
            }
        }

        async function waitForIceGathering(pc, timeoutMs = 8000) {
            if (pc.iceGatheringState === 'complete') return;
            return new Promise((resolve) => {
                const timeout = setTimeout(() => {
                    console.log('ICE gathering timeout – proceeding with current candidates');
                    resolve();
                }, timeoutMs);
                pc.onicegatheringstatechange = () => {
                    if (pc.iceGatheringState === 'complete') {
                        clearTimeout(timeout);
                        resolve();
                    }
                };
                // If already complete
                if (pc.iceGatheringState === 'complete') {
                    clearTimeout(timeout);
                    resolve();
                }
            });
        }

        function encodeSignalingData(data) {
            // Safe base64 encoding for SDP data
            const json = JSON.stringify(data);
            try {
                return btoa(unescape(encodeURIComponent(json)));
            } catch (e) {
                return btoa(json);
            }
        }

        function decodeSignalingData(encoded) {
            try {
                const json = decodeURIComponent(escape(atob(encoded)));
                return JSON.parse(json);
            } catch (e) {
                const json = atob(encoded);
                return JSON.parse(json);
            }
        }

        // ==================== SIGNALING FLOW ====================
        function generateRoomCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 8; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        function setState(state) {
            currentState = state;
            renderSignalingUI();
        }

        // ==================== ACTIONS ====================
        async function initiateCreateRoom() {
            setState(APP_STATE.CREATING_OFFER);
            roomCode = generateRoomCode();
            dom.roomCodeDisplay.textContent = roomCode;
            updateStatus('connecting', 'Setting up...');

            try {
                localStream = await getLocalMedia(true, true);
                dom.localVideo.srcObject = localStream;
                dom.localPlaceholder.style.display = 'none';
                dom.localVideo.style.display = 'block';

                peerConnection = createPeerConnection();

                // Add local tracks
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });

                // Create data channel for chat
                dataChannel = peerConnection.createDataChannel('chat', { ordered: true });
                setupDataChannel(dataChannel);

                // Create offer
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

                // Wait for ICE gathering
                await waitForIceGathering(peerConnection);

                // Get the complete SDP
                pendingOffer = {
                    type: 'offer',
                    sdp: peerConnection.localDescription.sdp,
                    roomCode: roomCode,
                };

                setState(APP_STATE.OFFER_READY);
                updateStatus('connecting', 'Waiting for partner...');
            } catch (err) {
                console.error('Create room error:', err);
                handleError(err.message);
            }
        }

        function initiateJoinRoom() {
            setState(APP_STATE.JOINING);
            updateStatus('connecting', 'Ready to join...');
        }

        async function processJoinOffer() {
            const pastedData = $('#offerPasteTextarea')?.value?.trim();
            if (!pastedData) {
                showToast('Please paste the connection data first');
                return;
            }

            setState(APP_STATE.GENERATING_ANSWER);

            try {
                const offerData = decodeSignalingData(pastedData);
                if (!offerData.sdp || offerData.type !== 'offer') {
                    throw new Error('Invalid connection data format');
                }

                roomCode = offerData.roomCode || generateRoomCode();
                dom.roomCodeDisplay.textContent = roomCode;

                localStream = await getLocalMedia(true, true);
                dom.localVideo.srcObject = localStream;
                dom.localPlaceholder.style.display = 'none';
                dom.localVideo.style.display = 'block';

                peerConnection = createPeerConnection();

                // Handle incoming data channel
                peerConnection.ondatachannel = (event) => {
                    remoteDataChannel = event.channel;
                    setupDataChannel(remoteDataChannel);
                };

                // Add local tracks
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });

                // Set remote description (the offer)
                await peerConnection.setRemoteDescription({
                    type: 'offer',
                    sdp: offerData.sdp
                });

                // Create answer
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);

                // Wait for ICE gathering
                await waitForIceGathering(peerConnection);

                pendingAnswer = {
                    type: 'answer',
                    sdp: peerConnection.localDescription.sdp,
                    roomCode: roomCode,
                };

                setState(APP_STATE.ANSWER_READY);
                updateStatus('connecting', 'Response ready – send it back');
            } catch (err) {
                console.error('Join room error:', err);
                handleError(err.message);
            }
        }

        async function submitAnswer() {
            const pastedAnswer = $('#answerTextarea')?.value?.trim();
            if (!pastedAnswer) {
                showToast('Please paste your partner\'s response');
                return;
            }

            try {
                const answerData = decodeSignalingData(pastedAnswer);
                if (!answerData.sdp || answerData.type !== 'answer') {
                    throw new Error('Invalid response data format');
                }

                await peerConnection.setRemoteDescription({
                    type: 'answer',
                    sdp: answerData.sdp
                });

                setState(APP_STATE.CONNECTED);
                showToast('🎉 Connected! Secure P2P link established.');
            } catch (err) {
                console.error('Submit answer error:', err);
                handleError(err.message);
            }
        }

        function finishJoining() {
            // The connection should be established once the offerer processes the answer
            setState(APP_STATE.CONNECTED);
            updateStatus('connected', 'Connected (P2P Encrypted)');
            updatePeerInfo(true, 'Peer');
            showToast('🎉 Connected! Waiting for final confirmation...');
        }

        function copyOffer() {
            const textarea = $('#offerTextarea');
            if (textarea) {
                textarea.select();
                navigator.clipboard.writeText(textarea.value).then(() => {
                    const feedback = $('#copiedFeedback');
                    if (feedback) feedback.classList.add('show');
                    setTimeout(() => {
                        if (feedback) feedback.classList.remove('show');
                    }, 2000);
                    showToast('Connection data copied! Share it with your partner.');
                }).catch(() => {
                    textarea.select();
                    document.execCommand('copy');
                    showToast('Copied! Share it with your partner.');
                });
            }
        }

        function copyAnswer() {
            const textarea = $('#answerOutputTextarea');
            if (textarea) {
                textarea.select();
                navigator.clipboard.writeText(textarea.value).then(() => {
                    const feedback = $('#copiedFeedback2');
                    if (feedback) feedback.classList.add('show');
                    setTimeout(() => {
                        if (feedback) feedback.classList.remove('show');
                    }, 2000);
                    showToast('Response copied! Send it back to your partner.');
                }).catch(() => {
                    textarea.select();
                    document.execCommand('copy');
                    showToast('Response copied! Send it back to your partner.');
                });
            }
        }

        function cancelSignaling() {
            cleanupConnection();
            setState(APP_STATE.IDLE);
            updateStatus('idle', 'Disconnected');
            dom.roomCodeDisplay.textContent = '—';
            updatePeerInfo(false);
        }

        function handleError(message) {
            setState(APP_STATE.ERROR);
            updateStatus('error', 'Error');
            const errorEl = $('#errorMessage');
            if (errorEl) errorEl.textContent = message;
            showToast('Error: ' + message);
        }

        function resetApp() {
            cleanupConnection();
            setState(APP_STATE.IDLE);
            updateStatus('idle', 'Disconnected');
            dom.roomCodeDisplay.textContent = '—';
            updatePeerInfo(false);
            dom.remoteVideo.srcObject = null;
            dom.remotePlaceholder.style.display = 'flex';
            dom.remoteVideo.style.display = 'none';
            dom.screenshareVideo.srcObject = null;
            dom.screenshareContainer.style.display = 'none';
            dom.videoGrid.classList.remove('single-screen', 'one-remote', 'with-screenshare');
            dom.recordingBadge.style.display = 'none';
            isRecording = false;
            isScreenSharing = false;
            updateControlButtons();
            dom.signalingOverlay.style.display = 'flex';
            updateVideoGridLayout();
        }

        function cleanupConnection() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            isRecording = false;
            recordedChunks = [];
            mediaRecorder = null;
            dom.recordingBadge.style.display = 'none';

            if (screenShareStream) {
                screenShareStream.getTracks().forEach(t => t.stop());
                screenShareStream = null;
            }
            isScreenSharing = false;

            if (dataChannel) {
                dataChannel.close();
                dataChannel = null;
            }
            if (remoteDataChannel) {
                remoteDataChannel.close();
                remoteDataChannel = null;
            }
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            dom.localVideo.srcObject = null;
            dom.localPlaceholder.style.display = 'flex';
            dom.localVideo.style.display = 'none';
            dom.remoteVideo.srcObject = null;
            dom.remotePlaceholder.style.display = 'flex';
            dom.remoteVideo.style.display = 'none';
            dom.screenshareVideo.srcObject = null;
            dom.screenshareContainer.style.display = 'none';
            dom.videoGrid.classList.remove('single-screen', 'one-remote', 'with-screenshare');
            remoteScreenShareStream = null;
            pendingOffer = null;
            pendingAnswer = null;
            roomCode = '';
            isMicMuted = false;
            isCameraOff = false;
            updateControlButtons();
            updateVideoGridLayout();
        }

        function setupDataChannel(channel) {
            channel.onopen = () => {
                console.log('Data channel opened');
                addChatMessage('Secure chat established', 'system');
            };
            channel.onclose = () => {
                console.log('Data channel closed');
            };
            channel.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'chat') {
                        addChatMessage(data.message, 'received');
                    } else if (data.type === 'screen-share-started') {
                        addChatMessage('Peer started screen sharing', 'system');
                    } else if (data.type === 'screen-share-stopped') {
                        addChatMessage('Peer stopped screen sharing', 'system');
                    }
                } catch (e) {
                    // Non-JSON message
                    addChatMessage(event.data, 'received');
                }
            };
        }

        // ==================== CONTROLS ====================
        function toggleMic() {
            if (!localStream) return;
            isMicMuted = !isMicMuted;
            localStream.getAudioTracks().forEach(track => {
                track.enabled = !isMicMuted;
            });
            updateControlButtons();
            showToast(isMicMuted ? 'Microphone muted' : 'Microphone unmuted');
        }

        function toggleCamera() {
            if (!localStream) return;
            isCameraOff = !isCameraOff;
            localStream.getVideoTracks().forEach(track => {
                if (!track.label.includes('screen') && !track.label.includes('display')) {
                    track.enabled = !isCameraOff;
                }
            });
            if (isCameraOff) {
                dom.localPlaceholder.style.display = 'flex';
                dom.localVideo.style.display = 'none';
            } else {
                dom.localPlaceholder.style.display = 'none';
                dom.localVideo.style.display = 'block';
            }
            updateControlButtons();
            updateVideoGridLayout();
            showToast(isCameraOff ? 'Camera off' : 'Camera on');
        }

        async function toggleScreenShare() {
            if (isScreenSharing) {
                stopScreenShare();
                return;
            }

            if (!peerConnection || peerConnection.connectionState !== 'connected') {
                showToast('Connect to a peer first before sharing your screen');
                return;
            }

            try {
                const displayStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 30 } },
                    audio: true, // Include system audio if available
                });

                screenShareStream = displayStream;
                isScreenSharing = true;

                // Display locally in the screenshare container
                dom.screenshareVideo.srcObject = displayStream;
                dom.screenshareContainer.style.display = 'flex';
                dom.videoGrid.classList.add('with-screenshare');
                updateVideoGridLayout();

                // Add screen share track to peer connection
                const videoTrack = displayStream.getVideoTracks()[0];
                if (videoTrack && peerConnection) {
                    const sender = peerConnection.getSenders().find(s =>
                        s.track && s.track.kind === 'video' && !s.track.label.includes('screen')
                    );
                    if (sender) {
                        // Replace existing video track with screen share
                        await sender.replaceTrack(videoTrack);
                    } else {
                        // Add as new track
                        peerConnection.addTrack(videoTrack, displayStream);
                    }
                }

                // Add audio track if available
                const audioTrack = displayStream.getAudioTracks()[0];
                if (audioTrack && peerConnection) {
                    peerConnection.addTrack(audioTrack, displayStream);
                }

                // Notify peer via data channel
                const channel = dataChannel || remoteDataChannel;
                if (channel && channel.readyState === 'open') {
                    channel.send(JSON.stringify({ type: 'screen-share-started' }));
                }

                // Handle user stopping via browser UI
                videoTrack.onended = () => {
                    stopScreenShare();
                };

                updateControlButtons();
                showToast('Screen sharing started');
            } catch (err) {
                console.error('Screen share error:', err);
                if (err.name !== 'AbortError') {
                    showToast('Screen sharing failed: ' + err.message);
                }
                isScreenSharing = false;
                updateControlButtons();
            }
        }

        function stopScreenShare() {
            if (screenShareStream) {
                screenShareStream.getTracks().forEach(t => t.stop());
                screenShareStream = null;
            }
            isScreenSharing = false;

            // Restore camera track if available
            if (peerConnection && localStream) {
                const cameraTrack = localStream.getVideoTracks().find(t =>
                    !t.label.includes('screen') && !t.label.includes('display')
                );
                if (cameraTrack) {
                    const sender = peerConnection.getSenders().find(s =>
                        s.track && s.track.kind === 'video'
                    );
                    if (sender) {
                        sender.replaceTrack(cameraTrack).catch(() => {
                            // If replace fails, re-add the track
                            peerConnection.addTrack(cameraTrack, localStream);
                        });
                    }
                }
            }

            dom.screenshareVideo.srcObject = null;
            dom.screenshareContainer.style.display = 'none';
            dom.videoGrid.classList.remove('with-screenshare');
            updateVideoGridLayout();

            // Notify peer
            const channel = dataChannel || remoteDataChannel;
            if (channel && channel.readyState === 'open') {
                channel.send(JSON.stringify({ type: 'screen-share-stopped' }));
            }

            if (isRecording) {
                stopRecording();
            }
            updateControlButtons();
            showToast('Screen sharing stopped');
        }

        function toggleRecording() {
            if (isRecording) {
                stopRecording();
                return;
            }
            startRecording();
        }

        function startRecording() {
            let streamToRecord = null;

            // Determine what to record
            if (screenShareStream && screenShareStream.getVideoTracks().length > 0) {
                // Record local screen share
                streamToRecord = screenShareStream;
            } else if (remoteScreenShareStream && remoteScreenShareStream.getVideoTracks().length > 0) {
                // Record remote screen share
                streamToRecord = remoteScreenShareStream;
            } else if (dom.remoteVideo.srcObject && dom.remoteVideo.srcObject.getVideoTracks().length > 0) {
                // Record remote camera
                streamToRecord = dom.remoteVideo.srcObject;
            } else {
                showToast('No video stream available to record');
                return;
            }

            const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ?
                'video/webm;codecs=vp9' :
                MediaRecorder.isTypeSupported('video/webm;codecs=vp8') ?
                'video/webm;codecs=vp8' :
                'video/webm';

            recordedChunks = [];
            try {
                mediaRecorder = new MediaRecorder(streamToRecord, {
                    mimeType: mimeType,
                    videoBitsPerSecond: 2500000,
                });

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data && event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `recording-${timestamp}.webm`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    recordedChunks = [];
                    showToast('Recording saved! 📹');
                };

                mediaRecorder.onerror = (err) => {
                    console.error('MediaRecorder error:', err);
                    showToast('Recording error');
                    isRecording = false;
                    updateControlButtons();
                };

                mediaRecorder.start(1000); // Collect data every second
                isRecording = true;
                dom.recordingBadge.style.display = 'flex';
                updateControlButtons();
                showToast('Recording started ⏺️');
            } catch (err) {
                console.error('Recording start error:', err);
                showToast('Failed to start recording: ' + err.message);
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            isRecording = false;
            dom.recordingBadge.style.display = 'none';
            updateControlButtons();
            showToast('Recording stopped');
        }

        function hangUp() {
            if (confirm('End the call and disconnect?')) {
                cleanupConnection();
                setState(APP_STATE.IDLE);
                updateStatus('idle', 'Disconnected');
                dom.roomCodeDisplay.textContent = '—';
                updatePeerInfo(false);
                dom.signalingOverlay.style.display = 'flex';
                dom.chatMessages.innerHTML = '<div class="chat-message system">Chat is end-to-end encrypted</div>';
                showToast('Call ended');
            }
        }

        function updateControlButtons() {
            // Mic button
            if (isMicMuted) {
                dom.micBtn.classList.add('active-muted');
                dom.micBtn.innerHTML = '🔇<span class="tooltip">Unmute</span>';
            } else {
                dom.micBtn.classList.remove('active-muted');
                dom.micBtn.innerHTML = '🎤<span class="tooltip">Microphone</span>';
            }

            // Camera button
            if (isCameraOff) {
                dom.camBtn.classList.add('active-muted');
                dom.camBtn.innerHTML = '🚫<span class="tooltip">Turn Camera On</span>';
            } else {
                dom.camBtn.classList.remove('active-muted');
                dom.camBtn.innerHTML = '📷<span class="tooltip">Camera</span>';
            }

            // Screen share button
            if (isScreenSharing) {
                dom.screenshareBtn.classList.add('screen-share-active');
                dom.screenshareBtn.innerHTML = '🖥️<span class="tooltip">Stop Sharing</span>';
            } else {
                dom.screenshareBtn.classList.remove('screen-share-active');
                dom.screenshareBtn.innerHTML = '🖥️<span class="tooltip">Share Screen</span>';
            }

            // Record button
            if (isRecording) {
                dom.recordBtn.classList.add('recording-active');
                dom.recordBtn.innerHTML = '⏹️<span class="tooltip">Stop Recording</span>';
            } else {
                dom.recordBtn.classList.remove('recording-active');
                dom.recordBtn.innerHTML = '⏺️<span class="tooltip">Record</span>';
            }
        }

        // ==================== INITIALIZATION ====================
        function init() {
            updateControlButtons();
            updateVideoGridLayout();
            setState(APP_STATE.IDLE);
            updateStatus('idle', 'Disconnected');
            dom.signalingOverlay.style.display = 'flex';
            dom.controlsBar.style.opacity = '1';

            // Handle browser tab close
            window.addEventListener('beforeunload', () => {
                cleanupConnection();
            });

            // Handle screen share stop via browser UI
            document.addEventListener('visibilitychange', () => {
                if (document.hidden && isScreenSharing && screenShareStream) {
                    const videoTrack = screenShareStream.getVideoTracks()[0];
                    if (videoTrack && videoTrack.readyState === 'ended') {
                        stopScreenShare();
                    }
                }
            });

            console.log('🔒 PrivateLink initialized');
            console.log('   - End-to-end encrypted via WebRTC DTLS-SRTP');
            console.log('   - Peer-to-peer: no server sees your data');
            console.log('   - Manual signaling: even connection setup is private');
            console.log('   - Create a room or join one to get started!');
        }

        init();
    </script>
</body>
</html>
