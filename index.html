<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PrivateLink · Mobile Adaptive</title>
  <style>
    :root {
      --bg-primary: #1a1b1e;
      --bg-secondary: #2c2d30;
      --bg-tertiary: #383a40;
      --bg-sidebar: #1e1f22;
      --text-primary: #e4e4e5;
      --text-muted: #8e8e92;
      --accent: #5865f2;
      --danger: #ed4245;
      --success: #57f287;
      --warning: #fbbd23;
      --border: #3f4147;
      --radius: 16px;
      --radius-sm: 12px;
      --safe-bottom: env(safe-area-inset-bottom, 12px);
      --font: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: var(--font);
      background: #000;
      color: var(--text-primary);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ── VIDEO LAYER ── */
    .video-stage {
      position: fixed;
      inset: 0;
      background: #000;
    }

    .remote-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0; left: 0;
    }

    /* Small local video overlay (draggable) */
    .local-video-container {
      position: absolute;
      width: 120px;
      height: 160px;
      bottom: 100px;
      right: 16px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.3);
      background: #000;
      z-index: 10;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
      touch-action: none;
      cursor: move;
    }
    .local-video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .local-video-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 12px;
      text-align: center;
    }

    /* Screen share container (fullscreen overlay) */
    .screenshare-overlay {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 15;
      display: none;
    }
    .screenshare-overlay video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ── CONTROLS (hidden by default, tap to show) ── */
    .controls-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      padding-bottom: max(12px, var(--safe-bottom));
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      z-index: 30;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .controls-bar.visible {
      transform: translateY(0);
    }

    .ctrl-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: rgba(44,45,48,0.9);
      color: #fff;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s;
    }
    .ctrl-btn:active { background: var(--accent); }
    .ctrl-btn.muted { background: var(--danger); }
    .ctrl-btn.screenshare-active { background: var(--accent); box-shadow: 0 0 12px rgba(88,101,242,0.6); }
    .ctrl-btn.recording-active { background: var(--danger); animation: pulse 1.2s infinite; }
    .hangup-btn {
      background: var(--danger);
      width: 56px;
      height: 56px;
      font-size: 24px;
    }

    @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.5; } }

    /* Connection overlay (unchanged mostly) */
    .connect-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26,27,30,0.98);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }
    .connect-card {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 24px;
      width: 90%;
      max-width: 360px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .connect-input {
      width: 100%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 14px 18px;
      color: var(--text-primary);
      font-size: 16px;
      text-align: center;
      margin: 16px 0;
      outline: none;
      font-family: var(--font);
    }
    .btn {
      padding: 12px 24px;
      border-radius: 30px;
      border: none;
      font-weight: 600;
      font-size: 14px;
      margin: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font);
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
    .error-text { color: var(--danger); font-size: 13px; margin-top: 8px; }

    /* Chat & Sidebar (drawers) */
    .chat-panel {
      position: fixed;
      right: -100%;
      top: 0; bottom: 0;
      width: 85%;
      max-width: 320px;
      background: var(--bg-sidebar);
      z-index: 50;
      border-left: 1px solid var(--border);
      transition: right 0.25s;
      display: flex;
      flex-direction: column;
      box-shadow: -4px 0 20px rgba(0,0,0,0.5);
    }
    .chat-panel.open { right: 0; }
    .chat-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
    }
    .chat-messages { flex:1; overflow-y:auto; padding:12px; }
    .chat-input-area { padding:12px; border-top:1px solid var(--border); display:flex; gap:8px; }
    .chat-input {
      flex:1; background:var(--bg-tertiary); border:1px solid var(--border);
      border-radius:20px; padding:10px 14px; color:var(--text-primary);
      font-size:13px; outline:none;
    }
    .send-btn {
      width:40px; height:40px; border-radius:50%; background:var(--accent);
      color:#fff; border:none; font-size:16px; display:flex; align-items:center; justify-content:center;
    }

    .sidebar {
      position: fixed;
      left: -100%;
      top: 0; bottom: 0;
      width: 80%;
      max-width: 300px;
      background: var(--bg-sidebar);
      z-index: 55;
      border-right: 1px solid var(--border);
      transition: left 0.25s;
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 20px rgba(0,0,0,0.5);
    }
    .sidebar.open { left: 0; }
    .sidebar-header { padding:16px; border-bottom:1px solid var(--border); }
    .room-code { font-size:14px; color:var(--success); font-family:monospace; }

    .toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #000; color:#fff; padding:10px 20px; border-radius:20px;
      font-size:13px; font-weight:600; z-index:200; transition: transform 0.3s;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px;
    }
    .status-dot.connected { background: var(--success); }

    /* Recording indicator */
    .rec-indicator {
      position: fixed; top: 16px; right: 16px; background: var(--danger);
      color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 12px;
      font-weight: 700; z-index: 25; display: none;
    }
    .rec-indicator.active { display: flex; align-items: center; gap: 4px; }

    .sidebar-toggle {
      position: fixed; top: 12px; left: 12px; z-index: 50;
      width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.6);
      color: #fff; border: none; font-size: 18px; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
    }
    .chat-toggle {
      position: fixed; top: 12px; right: 12px; z-index: 50;
      width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.6);
      color: #fff; border: none; font-size: 16px; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>

  <!-- Connection overlay -->
  <div class="connect-overlay" id="connectOverlay">
    <div class="connect-card">
      <h2>🔐 Room Code</h2>
      <p style="color:var(--text-muted);font-size:13px;margin-bottom:8px;">Both use same word to connect</p>
      <input class="connect-input" id="roomCodeInput" placeholder="e.g. blue-shark" autofocus>
      <div>
        <button class="btn btn-primary" onclick="startHost()">🏠 Host</button>
        <button class="btn btn-secondary" onclick="startGuest()">🔗 Join</button>
      </div>
      <div class="error-text" id="connectError"></div>
      <p style="font-size:10px;margin-top:16px;color:var(--text-muted);">No account • P2P encrypted</p>
    </div>
  </div>

  <!-- Video stage -->
  <div class="video-stage" id="videoStage" style="display:none;">
    <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
    <div class="local-video-container" id="localVideoContainer" draggable="true">
      <video id="localVideo" autoplay muted playsinline></video>
      <div class="local-video-placeholder" id="localPlaceholder" style="display:none;">📷 off</div>
    </div>
    <div class="screenshare-overlay" id="screenshareOverlay">
      <video id="screenshareVideo" autoplay playsinline></video>
    </div>
    <div class="rec-indicator" id="recIndicator">● REC</div>
  </div>

  <!-- Controls (hidden) -->
  <div class="controls-bar" id="controlsBar">
    <button class="ctrl-btn" id="micBtn" onclick="toggleMic()">🎤</button>
    <button class="ctrl-btn" id="camBtn" onclick="toggleCamera()">📷</button>
    <button class="ctrl-btn" id="screenshareBtn" onclick="toggleScreenShare()">🖥️</button>
    <button class="ctrl-btn" id="recordBtn" onclick="toggleRecording()">⏺️</button>
    <button class="ctrl-btn hangup-btn" onclick="hangUp()">✕</button>
  </div>

  <!-- Chat panel -->
  <div class="chat-panel" id="chatPanel">
    <div class="chat-header">💬 Chat <button style="background:none;border:none;color:var(--text-muted);font-size:18px;" onclick="toggleChat()">✕</button></div>
    <div class="chat-messages" id="chatMessages"><div style="color:var(--text-muted);font-style:italic;">Encrypted</div></div>
    <div class="chat-input-area">
      <input class="chat-input" id="chatInput" placeholder="Message..." onkeydown="if(event.key==='Enter')sendChat()">
      <button class="send-btn" onclick="sendChat()">➤</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <strong>PrivateLink</strong>
      <div class="room-code" id="roomCodeDisplay">—</div>
      <div style="margin-top:6px;font-size:12px;"><span class="status-dot" id="statusDot"></span> <span id="statusText">Offline</span></div>
    </div>
    <div style="padding:16px;color:var(--text-muted);font-size:13px;">Participants: You + Peer</div>
    <button class="btn btn-secondary" style="margin:auto 16px 16px;" onclick="toggleSidebar()">Close</button>
  </div>

  <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
  <button class="chat-toggle" onclick="toggleChat()">💬</button>

  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
  <script>
    // ═══════════════════════════════
    // CONFIG
    const iceServers = [
      { urls: 'stun:stun.l.google.com:19302' },
      {
        urls: 'turn:turn.metered.ca:443?transport=tcp',
        username: 'openrelayproject',
        credential: 'openrelayproject'
      },
      {
        urls: 'turn:turn.metered.ca:443?transport=udp',
        username: 'openrelayproject',
        credential: 'openrelayproject'
      }
    ];
    const hostConfig = { host: '0.peerjs.com', port: 443, secure: true, config: { iceServers } };
    const guestConfig = { host: '0.peerjs.com', port: 443, secure: true, config: { iceServers } };

    let localStream = null, screenShareStream = null;
    let peer = null, call = null, chatConn = null;
    let roomCode = '';
    let micMuted = false, camOff = false, screenSharing = false, recording = false;
    let mediaRecorder = null, recordedChunks = [];

    // DOM elements
    const $ = (s) => document.querySelector(s);
    const els = {
      connectOverlay: $('#connectOverlay'),
      videoStage: $('#videoStage'),
      remoteVideo: $('#remoteVideo'),
      localVideo: $('#localVideo'),
      localPlaceholder: $('#localPlaceholder'),
      localVideoContainer: $('#localVideoContainer'),
      screenshareOverlay: $('#screenshareOverlay'),
      screenshareVideo: $('#screenshareVideo'),
      recIndicator: $('#recIndicator'),
      controlsBar: $('#controlsBar'),
      micBtn: $('#micBtn'),
      camBtn: $('#camBtn'),
      screenshareBtn: $('#screenshareBtn'),
      recordBtn: $('#recordBtn'),
      chatPanel: $('#chatPanel'),
      chatMessages: $('#chatMessages'),
      chatInput: $('#chatInput'),
      sidebar: $('#sidebar'),
      roomCodeDisplay: $('#roomCodeDisplay'),
      statusDot: $('#statusDot'),
      statusText: $('#statusText'),
      toast: $('#toast'),
      connectError: $('#connectError'),
      roomCodeInput: $('#roomCodeInput'),
    };

    // ── TOAST ──
    let toastTimer;
    function toast(msg) {
      els.toast.textContent = msg;
      els.toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => els.toast.classList.remove('show'), 2500);
    }

    // ── CONTROLS SHOW/HIDE ON TAP ──
    let controlsTimeout;
    function showControls() {
      els.controlsBar.classList.add('visible');
      clearTimeout(controlsTimeout);
      controlsTimeout = setTimeout(() => els.controlsBar.classList.remove('visible'), 3000);
    }
    document.addEventListener('click', (e) => {
      // Don't trigger on controls themselves or overlays
      if (e.target.closest('.controls-bar') || e.target.closest('.connect-overlay') ||
          e.target.closest('.chat-panel') || e.target.closest('.sidebar') ||
          e.target.closest('button')) return;
      if (els.videoStage.style.display !== 'none') showControls();
    });

    // ── DRAGGABLE LOCAL VIDEO ──
    (function() {
      const container = els.localVideoContainer;
      let dragging = false, startX, startY, origLeft, origTop;
      container.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
          dragging = true;
          const touch = e.touches[0];
          startX = touch.clientX;
          startY = touch.clientY;
          const rect = container.getBoundingClientRect();
          origLeft = rect.left;
          origTop = rect.top;
          e.preventDefault();
        }
      });
      window.addEventListener('touchmove', (e) => {
        if (!dragging) return;
        const touch = e.touches[0];
        const dx = touch.clientX - startX;
        const dy = touch.clientY - startY;
        container.style.left = (origLeft + dx) + 'px';
        container.style.top = (origTop + dy) + 'px';
        container.style.right = 'auto';
        container.style.bottom = 'auto';
      });
      window.addEventListener('touchend', () => { dragging = false; });
    })();

    // ── MEDIA ──
    async function getLocalMedia(audio = true, video = true) {
      const constraints = {};
      if (video) constraints.video = { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' };
      if (audio) constraints.audio = {
        echoCancellation: { exact: true },
        noiseSuppression: { exact: true },
        autoGainControl: { exact: true }
      };
      try {
        return await navigator.mediaDevices.getUserMedia(constraints);
      } catch (e) {
        // Fallback to basic
        const fallback = {};
        if (video) fallback.video = true;
        if (audio) fallback.audio = true;
        return await navigator.mediaDevices.getUserMedia(fallback);
      }
    }

    function stopStream(s) { if (s) s.getTracks().forEach(t => t.stop()); }

    // ── UI UPDATES ──
    function updateMicButton() {
      els.micBtn.classList.toggle('muted', micMuted);
      els.micBtn.textContent = micMuted ? '🔇' : '🎤';
    }
    function updateCamButton() {
      els.camBtn.classList.toggle('muted', camOff);
      els.camBtn.textContent = camOff ? '🚫' : '📷';
    }
    function updateScreenShareButton() {
      els.screenshareBtn.classList.toggle('screenshare-active', screenSharing);
    }
    function updateRecordButton() {
      els.recordBtn.classList.toggle('recording-active', recording);
      els.recIndicator.classList.toggle('active', recording);
    }
    function refreshAllButtons() {
      updateMicButton();
      updateCamButton();
      updateScreenShareButton();
      updateRecordButton();
    }

    // ── TOGGLES ──
    function toggleMic() {
      if (!localStream) return;
      micMuted = !micMuted;
      localStream.getAudioTracks().forEach(t => t.enabled = !micMuted);
      updateMicButton();
      toast(micMuted ? 'Mic muted' : 'Mic on');
    }
    function toggleCamera() {
      if (!localStream) return;
      camOff = !camOff;
      localStream.getVideoTracks().forEach(t => t.enabled = !camOff);
      els.localPlaceholder.style.display = camOff ? 'flex' : 'none';
      els.localVideo.style.display = camOff ? 'none' : 'block';
      updateCamButton();
      toast(camOff ? 'Camera off' : 'Camera on');
    }
    async function toggleScreenShare() {
      if (screenSharing) { stopScreenShare(); return; }
      if (!call) { toast('Not connected'); return; }
      try {
        const displayStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
        screenShareStream = displayStream;
        screenSharing = true;
        els.screenshareVideo.srcObject = displayStream;
        els.screenshareOverlay.style.display = 'block';
        // Replace video track in peer connection
        const sender = call.peerConnection.getSenders().find(s => s.track?.kind === 'video');
        const videoTrack = displayStream.getVideoTracks()[0];
        if (sender && videoTrack) await sender.replaceTrack(videoTrack);
        else if (videoTrack) call.peerConnection.addTrack(videoTrack, displayStream);
        updateScreenShareButton();
        toast('Screen sharing started');
      } catch (err) { if (err.name !== 'AbortError') toast('Screen share failed'); }
    }
    function stopScreenShare() {
      if (screenShareStream) stopStream(screenShareStream);
      screenShareStream = null;
      screenSharing = false;
      els.screenshareOverlay.style.display = 'none';
      // Restore camera track
      if (call && localStream) {
        const camTrack = localStream.getVideoTracks()[0];
        if (camTrack) {
          const sender = call.peerConnection.getSenders().find(s => s.track?.kind === 'video');
          if (sender) sender.replaceTrack(camTrack).catch(() => {});
        }
      }
      updateScreenShareButton();
      if (recording) stopRecording();
      toast('Screen sharing stopped');
    }
    function toggleRecording() { recording ? stopRecording() : startRecording(); }
    function startRecording() {
      let stream = screenShareStream || els.screenshareVideo.srcObject || els.remoteVideo.srcObject;
      if (!stream) { toast('No stream'); return; }
      recordedChunks = [];
      const mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
      mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
      mediaRecorder.ondataavailable = e => { if (e.data.size) recordedChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `rec-${Date.now()}.webm`;
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
        toast('Recording saved');
      };
      mediaRecorder.start();
      recording = true;
      updateRecordButton();
      toast('Recording started');
    }
    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
      recording = false;
      updateRecordButton();
      toast('Recording stopped');
    }
    function hangUp() {
      if (confirm('End call?')) { disconnect(); els.connectOverlay.style.display = 'flex'; els.videoStage.style.display = 'none'; }
    }

    // ── CONNECTION ──
    async function startHost() {
      const code = els.roomCodeInput.value.trim();
      if (!code) { els.connectError.textContent = 'Enter a code'; return; }
      roomCode = code;
      els.connectOverlay.style.display = 'none';
      els.videoStage.style.display = 'block';
      els.roomCodeDisplay.textContent = code;
      els.statusDot.className = 'status-dot'; els.statusText.textContent = 'Waiting...';
      try {
        localStream = await getLocalMedia(true, true);
        els.localVideo.srcObject = localStream;
        els.localPlaceholder.style.display = 'none';
      } catch (e) { toast(e.message); els.connectOverlay.style.display = 'flex'; return; }
      peer = new Peer(code, hostConfig);
      peer.on('open', id => toast('Room created. Share code: ' + code));
      peer.on('call', incomingCall => {
        call = incomingCall;
        call.answer(localStream);
        setupCallEvents(call);
      });
      peer.on('connection', conn => { chatConn = conn; setupChat(conn); });
    }
    async function startGuest() {
      const code = els.roomCodeInput.value.trim();
      if (!code) { els.connectError.textContent = 'Enter a code'; return; }
      roomCode = code;
      els.connectOverlay.style.display = 'none';
      els.videoStage.style.display = 'block';
      els.roomCodeDisplay.textContent = code;
      els.statusDot.className = 'status-dot'; els.statusText.textContent = 'Connecting...';
      try {
        localStream = await getLocalMedia(true, true);
        els.localVideo.srcObject = localStream;
        els.localPlaceholder.style.display = 'none';
      } catch (e) { toast(e.message); els.connectOverlay.style.display = 'flex'; return; }
      peer = new Peer(guestConfig);
      peer.on('open', id => {
        call = peer.call(code, localStream);
        setupCallEvents(call);
        chatConn = peer.connect(code, { reliable: true });
        setupChat(chatConn);
      });
    }

    function setupCallEvents(c) {
      c.on('stream', remoteStream => {
        els.remoteVideo.srcObject = remoteStream;
        els.statusDot.className = 'status-dot connected';
        els.statusText.textContent = 'Connected';
        toast('🔒 Connected');
      });
      c.on('close', () => { disconnect(); els.connectOverlay.style.display = 'flex'; els.videoStage.style.display = 'none'; });
      c.on('error', () => toast('Call error'));
    }

    function setupChat(conn) {
      conn.on('open', () => { els.chatMessages.innerHTML += '<div style="color:var(--text-muted);">Chat ready</div>'; });
      conn.on('data', data => {
        if (data.type === 'chat') els.chatMessages.innerHTML += `<div style="margin:4px 0;">${data.message}</div>`;
      });
    }

    function disconnect() {
      if (call) { call.close(); call = null; }
      if (chatConn) { chatConn.close(); chatConn = null; }
      if (peer) { peer.destroy(); peer = null; }
      stopStream(localStream); localStream = null;
      stopStream(screenShareStream); screenShareStream = null;
      els.localVideo.srcObject = null; els.remoteVideo.srcObject = null;
      els.screenshareOverlay.style.display = 'none';
      els.recIndicator.classList.remove('active');
      recording = false;
      screenSharing = false;
      refreshAllButtons();
    }

    // Sidebar / Chat toggles
    function toggleSidebar() { els.sidebar.classList.toggle('open'); }
    function toggleChat() { els.chatPanel.classList.toggle('open'); }

    function sendChat() {
      const text = els.chatInput.value.trim();
      if (!text || !chatConn) return;
      chatConn.send({ type: 'chat', message: text });
      els.chatMessages.innerHTML += `<div style="text-align:right;color:var(--accent);">${text}</div>`;
      els.chatInput.value = '';
    }

    // Init
    refreshAllButtons();
    els.connectOverlay.style.display = 'flex';
    els.videoStage.style.display = 'none';
    window.addEventListener('beforeunload', disconnect);
  </script>
</body>
</html>
