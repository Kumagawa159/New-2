<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PrivateLink · 4K 60fps Ready</title>
  <style>
    :root {
      --bg-primary: #1a1b1e;
      --bg-secondary: #2c2d30;
      --bg-tertiary: #383a40;
      --text-primary: #e4e4e5;
      --text-muted: #8e8e92;
      --accent: #5865f2;
      --danger: #ed4245;
      --success: #57f287;
      --border: #3f4147;
      --radius: 16px;
      --radius-sm: 12px;
      --safe-bottom: env(safe-area-inset-bottom, 12px);
      --font: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font);
      background: #000; color: var(--text-primary);
      height: 100vh; width: 100vw; overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .video-stage {
      position: fixed; inset: 0; background: #000;
      display: none;
    }
    .remote-video-wrapper {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .remote-video {
      width: 100%; height: 100%;
      object-fit: contain;
    }
    .local-video-container {
      position: absolute;
      width: 30vw; max-width: 160px; min-width: 100px;
      aspect-ratio: 3/4;
      bottom: 100px; right: 16px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.4);
      background: #000; z-index: 10;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
      touch-action: none; cursor: move;
    }
    .local-video-container video { width:100%; height:100%; object-fit:cover; }
    .local-video-placeholder {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: var(--text-muted); font-size: 12px;
    }
    .screenshare-overlay {
      position: absolute; inset: 0; background: #000; z-index: 15;
      display: none;
    }
    .screenshare-overlay video { width:100%; height:100%; object-fit:contain; }
    .fullscreen-btn {
      position: absolute; top: 12px; right: 12px; z-index:20;
      background: rgba(0,0,0,0.6); color:#fff;
      border: none; border-radius: 50%; width: 40px; height: 40px;
      font-size: 20px; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px); cursor: pointer;
    }
    .controls-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; justify-content: center; gap: 8px;
      padding: 12px 20px;
      padding-bottom: max(12px, var(--safe-bottom));
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      z-index: 30; transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .controls-bar.visible { transform: translateY(0); }
    .ctrl-btn {
      width: 48px; height: 48px; border-radius: 50%; border: none;
      background: rgba(44,45,48,0.9); color: #fff;
      font-size: 20px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; backdrop-filter: blur(8px); transition: background 0.2s;
    }
    .ctrl-btn:active { background: var(--accent); }
    .ctrl-btn.muted { background: var(--danger); }
    .ctrl-btn.screenshare-active { background: var(--accent); box-shadow: 0 0 12px rgba(88,101,242,0.6); }
    .ctrl-btn.recording-active { background: var(--danger); animation: pulse 1.2s infinite; }
    .hangup-btn { background: var(--danger); width: 56px; height: 56px; font-size: 24px; }
    @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.5; } }
    .connect-overlay {
      position: fixed; inset: 0; background: rgba(26,27,30,0.98); z-index:100;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
    }
    .connect-card {
      background: var(--bg-secondary); border-radius: var(--radius);
      padding: 24px; width: 90%; max-width: 360px;
      border: 1px solid var(--border); text-align: center;
    }
    .connect-input {
      width: 100%; background: var(--bg-tertiary); border:1px solid var(--border);
      border-radius:30px; padding:14px 18px; color:var(--text-primary);
      font-size:16px; text-align:center; margin:16px 0; outline:none;
      font-family: var(--font);
    }
    .btn {
      padding:12px 24px; border-radius:30px; border:none; font-weight:600;
      font-size:14px; margin:6px; cursor:pointer; transition:all 0.2s;
      font-family: var(--font);
    }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-secondary { background:var(--bg-tertiary); color:var(--text-primary); border:1px solid var(--border); }
    .error-text { color:var(--danger); font-size:13px; margin-top:8px; }
    .chat-panel, .sidebar {
      position: fixed; top:0; bottom:0; width:85%; max-width:320px;
      background:var(--bg-secondary); z-index:50; transition:transform 0.25s;
      display:flex; flex-direction:column;
    }
    .chat-panel { right:-100%; border-left:1px solid var(--border); }
    .chat-panel.open { right:0; }
    .sidebar { left:-100%; border-right:1px solid var(--border); }
    .sidebar.open { left:0; }
    .chat-header, .sidebar-header {
      padding:16px; border-bottom:1px solid var(--border);
      display:flex; justify-content:space-between; align-items:center; font-weight:700;
    }
    .chat-messages { flex:1; overflow-y:auto; padding:12px; }
    .chat-input-area { padding:12px; border-top:1px solid var(--border); display:flex; gap:8px; }
    .chat-input {
      flex:1; background:var(--bg-tertiary); border:1px solid var(--border);
      border-radius:20px; padding:10px 14px; color:var(--text-primary);
      font-size:13px; outline:none;
    }
    .send-btn {
      width:40px; height:40px; border-radius:50%; background:var(--accent);
      color:#fff; border:none; font-size:16px;
      display:flex; align-items:center; justify-content:center;
    }
    .toast {
      position: fixed; bottom: 80px; left:50%; transform:translateX(-50%) translateY(100px);
      background:#000; color:#fff; padding:10px 20px; border-radius:20px;
      font-size:13px; font-weight:600; z-index:200; transition:transform 0.3s;
    }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:6px; }
    .status-dot.connected { background:var(--success); }
    .rec-indicator {
      position:fixed; top:16px; right:16px; background:var(--danger);
      color:#fff; padding:4px 12px; border-radius:20px; font-size:12px;
      font-weight:700; z-index:25; display:none; align-items:center; gap:4px;
    }
    .rec-indicator.active { display:flex; }
    .sidebar-toggle, .chat-toggle {
      position:fixed; top:12px; z-index:50; width:40px; height:40px;
      border-radius:50%; background:rgba(0,0,0,0.6); color:#fff;
      border:none; font-size:18px; display:flex; align-items:center; justify-content:center;
      backdrop-filter:blur(6px);
    }
    .sidebar-toggle { left:12px; }
    .chat-toggle { right:12px; }
    .remote-mute-btn {
      position:absolute; top:12px; left:12px; z-index:20;
      background:rgba(0,0,0,0.6); color:#fff; border:none; border-radius:50%;
      width:40px; height:40px; font-size:18px; display:flex; align-items:center;
      justify-content:center; backdrop-filter:blur(6px); cursor:pointer;
    }
  </style>
</head>
<body>

  <!-- Connection overlay -->
  <div class="connect-overlay" id="connectOverlay">
    <div class="connect-card">
      <h2>🔐 Room Code</h2>
      <p style="color:var(--text-muted);font-size:13px;margin-bottom:8px;">Same code on both devices</p>
      <input class="connect-input" id="roomCodeInput" placeholder="e.g. blue-shark" autofocus>
      <div>
        <button class="btn btn-primary" onclick="startHost()">🏠 Host</button>
        <button class="btn btn-secondary" onclick="startGuest()">🔗 Join</button>
      </div>
      <div class="error-text" id="connectError"></div>
      <p style="font-size:10px;margin-top:16px;color:var(--text-muted);">No account • P2P encrypted</p>
    </div>
  </div>

  <!-- Video stage -->
  <div class="video-stage" id="videoStage">
    <div class="remote-video-wrapper">
      <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
      <button class="remote-mute-btn" id="remoteMuteBtn" onclick="toggleRemoteAudio()" title="Mute remote audio">🔊</button>
    </div>
    <div class="local-video-container" id="localVideoContainer">
      <video id="localVideo" autoplay muted playsinline></video>
      <div class="local-video-placeholder" id="localPlaceholder" style="display:none;">📷 off</div>
    </div>
    <div class="screenshare-overlay" id="screenshareOverlay">
      <video id="screenshareVideo" autoplay playsinline></video>
      <button class="fullscreen-btn" id="fullscreenBtn" title="Full screen" onclick="toggleFullscreen()">⛶</button>
    </div>
    <div class="rec-indicator" id="recIndicator">● REC</div>
  </div>

  <!-- Controls (hidden) -->
  <div class="controls-bar" id="controlsBar">
    <button class="ctrl-btn" id="micBtn" onclick="toggleMic()">🎤</button>
    <button class="ctrl-btn" id="camBtn" onclick="toggleCamera()">📷</button>
    <button class="ctrl-btn" id="screenshareBtn" onclick="toggleScreenShare()">🖥️</button>
    <button class="ctrl-btn" id="recordBtn" onclick="toggleRecording()">⏺️</button>
    <button class="ctrl-btn hangup-btn" onclick="hangUp()">✕</button>
  </div>

  <!-- Chat panel -->
  <div class="chat-panel" id="chatPanel">
    <div class="chat-header">💬 Chat <button style="background:none;border:none;color:var(--text-muted);font-size:18px;" onclick="toggleChat()">✕</button></div>
    <div class="chat-messages" id="chatMessages"><div style="color:var(--text-muted);font-style:italic;">Encrypted</div></div>
    <div class="chat-input-area">
      <input class="chat-input" id="chatInput" placeholder="Message..." onkeydown="if(event.key==='Enter')sendChat()">
      <button class="send-btn" onclick="sendChat()">➤</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <strong>PrivateLink</strong>
      <div class="room-code" id="roomCodeDisplay" style="color:var(--success);font-family:monospace;">—</div>
      <div style="margin-top:6px;font-size:12px;">
        <span class="status-dot" id="statusDot"></span> <span id="statusText">Offline</span>
      </div>
    </div>
    <div style="padding:16px;color:var(--text-muted);font-size:13px;">Participants: You + Peer</div>
    <button class="btn btn-secondary" style="margin:auto 16px 16px;" onclick="toggleSidebar()">Close</button>
  </div>

  <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
  <button class="chat-toggle" onclick="toggleChat()">💬</button>

  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
  <script>
    // ═══════════════ CONFIG ═══════════════
    const iceServers = [
      { urls: 'stun:stun.l.google.com:19302' },
      {
        urls: 'turn:turn.metered.ca:443?transport=tcp',
        username: 'openrelayproject',
        credential: 'openrelayproject'
      },
      {
        urls: 'turn:turn.metered.ca:443?transport=udp',
        username: 'openrelayproject',
        credential: 'openrelayproject'
      }
    ];
    const hostConfig = { host: '0.peerjs.com', port: 443, secure: true, config: { iceServers } };
    const guestConfig = { host: '0.peerjs.com', port: 443, secure: true, config: { iceServers } };

    let localStream = null, screenShareStream = null;
    let peer = null, call = null, chatConn = null;
    let roomCode = '';
    let micMuted = false, camOff = false, screenSharing = false, recording = false;
    let mediaRecorder = null, recordedChunks = [];
    let remoteAudioMuted = false;

    const $ = (s) => document.querySelector(s);
    const els = {
      connectOverlay: $('#connectOverlay'),
      videoStage: $('#videoStage'),
      remoteVideo: $('#remoteVideo'),
      localVideo: $('#localVideo'),
      localPlaceholder: $('#localPlaceholder'),
      localVideoContainer: $('#localVideoContainer'),
      screenshareOverlay: $('#screenshareOverlay'),
      screenshareVideo: $('#screenshareVideo'),
      fullscreenBtn: $('#fullscreenBtn'),
      remoteMuteBtn: $('#remoteMuteBtn'),
      recIndicator: $('#recIndicator'),
      controlsBar: $('#controlsBar'),
      micBtn: $('#micBtn'), camBtn: $('#camBtn'),
      screenshareBtn: $('#screenshareBtn'), recordBtn: $('#recordBtn'),
      chatPanel: $('#chatPanel'), chatMessages: $('#chatMessages'),
      chatInput: $('#chatInput'), sidebar: $('#sidebar'),
      roomCodeDisplay: $('#roomCodeDisplay'),
      statusDot: $('#statusDot'), statusText: $('#statusText'),
      toast: $('#toast'), connectError: $('#connectError'),
      roomCodeInput: $('#roomCodeInput'),
    };

    // ── Toast ──
    let toastTimer;
    function toast(msg) {
      els.toast.textContent = msg;
      els.toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => els.toast.classList.remove('show'), 2500);
    }

    // ── Controls show/hide on tap ──
    let controlsTimeout;
    function showControls() {
      els.controlsBar.classList.add('visible');
      clearTimeout(controlsTimeout);
      controlsTimeout = setTimeout(() => els.controlsBar.classList.remove('visible'), 3000);
    }
    document.addEventListener('click', (e) => {
      if (e.target.closest('.controls-bar') || e.target.closest('.connect-overlay') ||
          e.target.closest('.chat-panel') || e.target.closest('.sidebar') ||
          e.target.closest('button')) return;
      if (els.videoStage.style.display !== 'none') showControls();
    });

    // ── Draggable local video ──
    (function() {
      const container = els.localVideoContainer;
      let dragging = false, startX, startY, origLeft, origTop;
      container.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
          dragging = true;
          const t = e.touches[0];
          startX = t.clientX; startY = t.clientY;
          const rect = container.getBoundingClientRect();
          origLeft = rect.left; origTop = rect.top;
          e.preventDefault();
        }
      });
      window.addEventListener('touchmove', (e) => {
        if (!dragging) return;
        const t = e.touches[0];
        container.style.left = (origLeft + t.clientX - startX) + 'px';
        container.style.top = (origTop + t.clientY - startY) + 'px';
        container.style.right = 'auto'; container.style.bottom = 'auto';
      });
      window.addEventListener('touchend', () => { dragging = false; });
    })();

    // ── HIGH QUALITY MEDIA (4K 60fps request) ──
    async function getLocalMedia(audio = true, video = true) {
      const constraints = {};
      if (video) {
        constraints.video = {
          width: { ideal: 3840 },      // 4K
          height: { ideal: 2160 },
          frameRate: { ideal: 60 },
          facingMode: 'user'
        };
      }
      if (audio) {
        constraints.audio = {
          echoCancellation: { ideal: true },
          noiseSuppression: { ideal: true },
          autoGainControl: { ideal: true }
        };
      }
      try {
        return await navigator.mediaDevices.getUserMedia(constraints);
      } catch (e) {
        console.warn('High‑quality request failed, falling back to 1080p60', e);
        try {
          const fallback = {
            video: video ? { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 60 }, facingMode: 'user' } : false,
            audio: audio ? { echoCancellation: true, noiseSuppression: true, autoGainControl: true } : false
          };
          return await navigator.mediaDevices.getUserMedia(fallback);
        } catch (e2) {
          console.warn('1080p fallback failed, basic request', e2);
          return await navigator.mediaDevices.getUserMedia({
            video: video,
            audio: audio ? { echoCancellation: true, noiseSuppression: true, autoGainControl: true } : false
          });
        }
      }
    }

    function stopStream(s) { if (s) s.getTracks().forEach(t => t.stop()); }

    // ── Remote audio mute toggle ──
    function toggleRemoteAudio() {
      remoteAudioMuted = !remoteAudioMuted;
      els.remoteVideo.muted = remoteAudioMuted;
      els.remoteMuteBtn.textContent = remoteAudioMuted ? '🔇' : '🔊';
      toast(remoteAudioMuted ? 'Remote audio muted' : 'Remote audio on');
    }

    // ── UI updates ──
    function updateButtons() {
      els.micBtn.classList.toggle('muted', micMuted);
      els.micBtn.textContent = micMuted ? '🔇' : '🎤';
      els.camBtn.classList.toggle('muted', camOff);
      els.camBtn.textContent = camOff ? '🚫' : '📷';
      els.screenshareBtn.classList.toggle('screenshare-active', screenSharing);
      els.recordBtn.classList.toggle('recording-active', recording);
      els.recIndicator.classList.toggle('active', recording);
    }

    // ── Toggle functions ──
    function toggleMic() {
      if (!localStream) return;
      micMuted = !micMuted;
      localStream.getAudioTracks().forEach(t => t.enabled = !micMuted);
      updateButtons();
      toast(micMuted ? 'Mic muted' : 'Mic on');
    }
    function toggleCamera() {
      if (!localStream) return;
      camOff = !camOff;
      localStream.getVideoTracks().forEach(t => t.enabled = !camOff);
      els.localPlaceholder.style.display = camOff ? 'flex' : 'none';
      els.localVideo.style.display = camOff ? 'none' : 'block';
      updateButtons();
      toast(camOff ? 'Camera off' : 'Camera on');
    }
    async function toggleScreenShare() {
      if (screenSharing) { stopScreenShare(); return; }
      if (!call) { toast('Not connected'); return; }
      try {
        const displayStream = await navigator.mediaDevices.getDisplayMedia({
          video: {
            width: { ideal: 3840 },
            height: { ideal: 2160 },
            frameRate: { ideal: 60 }
          },
          audio: true
        });
        screenShareStream = displayStream;
        screenSharing = true;
        els.screenshareVideo.srcObject = displayStream;
        els.screenshareOverlay.style.display = 'block';
        const sender = call.peerConnection.getSenders().find(s => s.track?.kind === 'video');
        const vt = displayStream.getVideoTracks()[0];
        if (sender && vt) await sender.replaceTrack(vt);
        else if (vt) call.peerConnection.addTrack(vt, displayStream);
        const at = displayStream.getAudioTracks()[0];
        if (at) call.peerConnection.addTrack(at, displayStream);
        updateButtons();
        toast('Screen sharing started (4K 60fps requested)');
      } catch (err) {
        if (err.name !== 'AbortError') toast('Screen share failed');
      }
    }
    function stopScreenShare() {
      if (screenShareStream) stopStream(screenShareStream);
      screenShareStream = null;
      screenSharing = false;
      els.screenshareOverlay.style.display = 'none';
      if (call && localStream) {
        const camTrack = localStream.getVideoTracks()[0];
        if (camTrack) {
          const sender = call.peerConnection.getSenders().find(s => s.track?.kind === 'video');
          if (sender) sender.replaceTrack(camTrack).catch(() => {});
        }
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack) {
          const audioSender = call.peerConnection.getSenders().find(s => s.track?.kind === 'audio');
          if (audioSender) audioSender.replaceTrack(audioTrack).catch(() => {});
        }
      }
      updateButtons();
      if (recording) stopRecording();
      toast('Screen sharing stopped');
    }
    function toggleRecording() { recording ? stopRecording() : startRecording(); }
    function startRecording() {
      let stream = screenShareStream || els.screenshareVideo.srcObject || els.remoteVideo.srcObject;
      if (!stream) { toast('No stream'); return; }
      recordedChunks = [];
      const mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
      mediaRecorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 8000000 });
      mediaRecorder.ondataavailable = e => { if (e.data.size) recordedChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `rec-${Date.now()}.webm`;
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
        toast('Recording saved');
      };
      mediaRecorder.start();
      recording = true;
      updateButtons();
      toast('Recording started');
    }
    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
      recording = false;
      updateButtons();
      toast('Recording stopped');
    }
    function hangUp() {
      if (confirm('End call?')) { disconnect(); els.connectOverlay.style.display = 'flex'; els.videoStage.style.display = 'none'; }
    }
    function toggleFullscreen() {
      const el = els.screenshareVideo;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    // ── Connection ──
    async function startHost() {
      const code = els.roomCodeInput.value.trim();
      if (!code) { els.connectError.textContent = 'Enter a code'; return; }
      roomCode = code;
      els.connectOverlay.style.display = 'none';
      els.videoStage.style.display = 'block';
      els.roomCodeDisplay.textContent = code;
      els.statusDot.className = 'status-dot'; els.statusText.textContent = 'Waiting...';
      try {
        localStream = await getLocalMedia(true, true);
        els.localVideo.srcObject = localStream;
        els.localPlaceholder.style.display = 'none';
      } catch (e) { toast(e.message); els.connectOverlay.style.display = 'flex'; return; }
      peer = new Peer(code, hostConfig);
      peer.on('open', id => toast('Room created. Share: ' + code));
      peer.on('call', incomingCall => {
        call = incomingCall;
        call.answer(localStream);
        setupCallEvents(call);
      });
      peer.on('connection', conn => { chatConn = conn; setupChat(conn); });
    }
    async function startGuest() {
      const code = els.roomCodeInput.value.trim();
      if (!code) { els.connectError.textContent = 'Enter a code'; return; }
      roomCode = code;
      els.connectOverlay.style.display = 'none';
      els.videoStage.style.display = 'block';
      els.roomCodeDisplay.textContent = code;
      els.statusDot.className = 'status-dot'; els.statusText.textContent = 'Connecting...';
      try {
        localStream = await getLocalMedia(true, true);
        els.localVideo.srcObject = localStream;
        els.localPlaceholder.style.display = 'none';
      } catch (e) { toast(e.message); els.connectOverlay.style.display = 'flex'; return; }
      peer = new Peer(guestConfig);
      peer.on('open', id => {
        call = peer.call(code, localStream);
        setupCallEvents(call);
        chatConn = peer.connect(code, { reliable: true });
        setupChat(chatConn);
      });
    }
    function setupCallEvents(c) {
      c.on('stream', remoteStream => {
        els.remoteVideo.srcObject = remoteStream;
        els.remoteVideo.muted = false;
        remoteAudioMuted = false;
        els.remoteMuteBtn.textContent = '🔊';
        els.statusDot.className = 'status-dot connected';
        els.statusText.textContent = 'Connected';
        toast('🔒 Connected');
      });
      c.on('close', () => { disconnect(); els.connectOverlay.style.display = 'flex'; els.videoStage.style.display = 'none'; });
      c.on('error', () => toast('Call error'));
    }
    function setupChat(conn) {
      conn.on('open', () => els.chatMessages.innerHTML += '<div style="color:var(--text-muted);">Chat ready</div>');
      conn.on('data', data => {
        if (data.type === 'chat') els.chatMessages.innerHTML += `<div style="margin:4px 0;">${data.message}</div>`;
      });
    }
    function disconnect() {
      if (call) { call.close(); call = null; }
      if (chatConn) { chatConn.close(); chatConn = null; }
      if (peer) { peer.destroy(); peer = null; }
      stopStream(localStream); localStream = null;
      stopStream(screenShareStream); screenShareStream = null;
      els.localVideo.srcObject = null; els.remoteVideo.srcObject = null;
      els.screenshareOverlay.style.display = 'none';
      els.recIndicator.classList.remove('active');
      recording = false; screenSharing = false;
      updateButtons();
    }

    function toggleSidebar() { els.sidebar.classList.toggle('open'); }
    function toggleChat() { els.chatPanel.classList.toggle('open'); }
    function sendChat() {
      const text = els.chatInput.value.trim();
      if (!text || !chatConn) return;
      chatConn.send({ type: 'chat', message: text });
      els.chatMessages.innerHTML += `<div style="text-align:right;color:var(--accent);">${text}</div>`;
      els.chatInput.value = '';
    }

    updateButtons();
    els.connectOverlay.style.display = 'flex';
    els.videoStage.style.display = 'none';
    window.addEventListener('beforeunload', disconnect);
  </script>
</body>
</html>
